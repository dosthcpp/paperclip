<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="900" />

  <!-- 1: dimmed underlay (just outline + label) -->
  <g data-region="underlay" stroke="#e6e6e6">
    <text x="48" y="40" font-size="12" stroke="none" fill="#666">SETTINGS › ACCESS › EDIT MEMBER: JORDAN PARK</text>
    <line x1="48" y1="56" x2="1232" y2="56" />
    <rect x="48" y="80" width="1184" height="800" fill="#fafafa" stroke="#e6e6e6" />
    <text x="64" y="112" font-size="12" stroke="none" fill="#666">underlying access page (dimmed)</text>
  </g>

  <!-- 2: dialog -->
  <g data-region="dialog" transform="translate(248,72)">
    <rect width="784" height="752" rx="6" />

    <!-- header -->
    <g transform="translate(0,0)">
      <line x1="0" y1="76" x2="784" y2="76" />
      <text x="24" y="36" font-size="20" stroke="none" fill="#000">Edit grant · Scoped task assignment</text>
      <text x="24" y="60" font-size="13" stroke="none" fill="#666">Jordan Park · tasks:assign_scope · principal_permission_grants.scope</text>
      <text x="760" y="40" font-size="20" stroke="none" fill="#666" text-anchor="end">×</text>
    </g>

    <!-- explainer -->
    <g transform="translate(24,96)">
      <rect width="736" height="64" rx="4" />
      <text x="16" y="24" font-size="13" stroke="none" fill="#000" font-weight="600">All chosen scopes must match for assignment to succeed.</text>
      <text x="16" y="44" font-size="12" stroke="none" fill="#666">Leave a section as "Any" to skip that family. At least one constraint family must be set, otherwise this</text>
      <text x="16" y="58" font-size="12" stroke="none" fill="#666">becomes an unscoped tasks:assign grant — switch the row above to remove the scope.</text>
    </g>

    <!-- A: project scope -->
    <g data-region="project-scope" transform="translate(24,184)">
      <text x="0" y="16" font-size="12" stroke="none" fill="#666">1 · PROJECT SCOPE</text>
      <text x="0" y="36" font-size="14" stroke="none" fill="#000">Restrict to specific projects</text>
      <g transform="translate(0,52)">
        <g><circle cx="10" cy="10" r="8" /><text x="28" y="14" font-size="13" stroke="none" fill="#666">Any project (no project restriction)</text></g>
        <g transform="translate(0,28)"><circle cx="10" cy="10" r="8" fill="#000" /><circle cx="10" cy="10" r="3" fill="#fff" stroke="none" /><text x="28" y="14" font-size="13" stroke="none" fill="#000">Selected projects (1 required)</text></g>
      </g>
      <g transform="translate(0,128)">
        <rect width="736" height="40" rx="4" />
        <g transform="translate(12,8)">
          <rect width="120" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="60" y="16" font-size="12" stroke="none" fill="#000" text-anchor="middle">Onboarding ×</text>
          <rect x="128" width="124" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="190" y="16" font-size="12" stroke="none" fill="#000" text-anchor="middle">Growth Loops ×</text>
        </g>
        <text x="640" y="26" font-size="12" stroke="none" fill="#666">+ Add project</text>
      </g>
    </g>

    <!-- B: managed-subtree scope -->
    <g data-region="subtree-scope" transform="translate(24,376)">
      <text x="0" y="16" font-size="12" stroke="none" fill="#666">2 · MANAGED-SUBTREE SCOPE</text>
      <text x="0" y="36" font-size="14" stroke="none" fill="#000">Restrict to everyone under a manager</text>
      <g transform="translate(0,52)">
        <g><circle cx="10" cy="10" r="8" fill="#000" /><circle cx="10" cy="10" r="3" fill="#fff" stroke="none" /><text x="28" y="14" font-size="13" stroke="none" fill="#000">Any subtree (no subtree restriction)</text></g>
        <g transform="translate(0,28)"><circle cx="10" cy="10" r="8" /><text x="28" y="14" font-size="13" stroke="none" fill="#666">Selected subtree roots</text></g>
      </g>
      <text x="0" y="124" font-size="12" stroke="none" fill="#666">Selecting a manager grants assignment to that manager and all reports below them, recursively.</text>
    </g>

    <!-- C: target agent allowlist -->
    <g data-region="agent-allowlist" transform="translate(24,544)">
      <text x="0" y="16" font-size="12" stroke="none" fill="#666">3 · TARGET-AGENT ALLOWLIST</text>
      <text x="0" y="36" font-size="14" stroke="none" fill="#000">Restrict to a specific list of agents</text>
      <g transform="translate(0,52)">
        <g><circle cx="10" cy="10" r="8" /><text x="28" y="14" font-size="13" stroke="none" fill="#666">Any agent (no agent restriction)</text></g>
        <g transform="translate(0,28)"><circle cx="10" cy="10" r="8" fill="#000" /><circle cx="10" cy="10" r="3" fill="#fff" stroke="none" /><text x="28" y="14" font-size="13" stroke="none" fill="#000">Selected agents (3)</text></g>
      </g>
      <g transform="translate(0,128)">
        <rect width="736" height="40" rx="4" />
        <g transform="translate(12,8)">
          <rect width="120" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="60" y="16" font-size="12" stroke="none" fill="#000" text-anchor="middle">Engineer · Ada ×</text>
          <rect x="128" width="120" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="188" y="16" font-size="12" stroke="none" fill="#000" text-anchor="middle">Designer · Iris ×</text>
          <rect x="256" width="108" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="310" y="16" font-size="12" stroke="none" fill="#000" text-anchor="middle">QA · Cypress ×</text>
        </g>
        <text x="640" y="26" font-size="12" stroke="none" fill="#666">+ Add agent</text>
      </g>
    </g>
  </g>

  <!-- 3: live summary preview (right rail) -->
  <g data-region="summary-rail" transform="translate(1048,72)">
    <rect width="200" height="752" rx="6" />
    <g transform="translate(16,24)">
      <text x="0" y="0" font-size="12" stroke="none" fill="#666">RESULT SUMMARY</text>
      <text x="0" y="32" font-size="14" stroke="none" fill="#000" font-weight="600">When Jordan tries to</text>
      <text x="0" y="48" font-size="14" stroke="none" fill="#000" font-weight="600">assign a task…</text>
      <text x="0" y="84" font-size="12" stroke="none" fill="#000">it must satisfy ALL of:</text>

      <g transform="translate(0,108)">
        <text x="0" y="0" font-size="11" stroke="none" fill="#666">PROJECT</text>
        <text x="0" y="20" font-size="12" stroke="none" fill="#000">Onboarding</text>
        <text x="0" y="36" font-size="12" stroke="none" fill="#000">Growth Loops</text>
      </g>

      <g transform="translate(0,180)">
        <text x="0" y="0" font-size="11" stroke="none" fill="#666">SUBTREE</text>
        <text x="0" y="20" font-size="12" stroke="none" fill="#666">— any —</text>
      </g>

      <g transform="translate(0,232)">
        <text x="0" y="0" font-size="11" stroke="none" fill="#666">AGENT</text>
        <text x="0" y="20" font-size="12" stroke="none" fill="#000">Engineer · Ada</text>
        <text x="0" y="36" font-size="12" stroke="none" fill="#000">Designer · Iris</text>
        <text x="0" y="52" font-size="12" stroke="none" fill="#000">QA · Cypress</text>
      </g>

      <g transform="translate(0,324)">
        <line x1="0" y1="0" x2="168" y2="0" />
        <text x="0" y="24" font-size="11" stroke="none" fill="#666">DENIALS</text>
        <text x="0" y="44" font-size="11" stroke="none" fill="#666">Return 403 with a generic</text>
        <text x="0" y="58" font-size="11" stroke="none" fill="#666">scope message — no leak</text>
        <text x="0" y="72" font-size="11" stroke="none" fill="#666">of hidden projects/agents.</text>
      </g>
    </g>
  </g>

  <!-- 4: footer / actions -->
  <g data-region="footer" transform="translate(248,824)">
    <rect width="784" height="56" rx="0" />
    <line x1="0" y1="0" x2="784" y2="0" />
    <g transform="translate(560,12)">
      <rect width="100" height="32" rx="4" /><text x="50" y="20" font-size="13" stroke="none" fill="#000" text-anchor="middle">Cancel</text>
      <rect x="112" width="112" height="32" rx="4" fill="#000" /><text x="168" y="20" font-size="13" stroke="none" fill="#fff" text-anchor="middle">Save grant</text>
    </g>
    <text x="24" y="32" font-size="12" stroke="none" fill="#666">Saved scope is shown in the member grants column.</text>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="266" cy="216" r="10" />
    <circle cx="266" cy="408" r="10" />
    <circle cx="266" cy="576" r="10" />
    <circle cx="1062" cy="148" r="10" />
    <circle cx="266" cy="184" r="10" />
  </g>
  <g font-size="11" stroke="none" fill="#d33">
    <text x="282" y="220">2</text>
    <text x="282" y="412">3</text>
    <text x="282" y="580">4</text>
    <text x="1078" y="152">5</text>
    <text x="282" y="188">1</text>
  </g>
</svg>
