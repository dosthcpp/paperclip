<svg xmlns="http://www.w3.org/2000/svg" width="375" height="1660" viewBox="0 0 375 1660"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="1660" />

  <!-- 1: status + title -->
  <g data-region="topbar">
    <line x1="0" y1="44" x2="375" y2="44" />
    <text x="16" y="76" font-size="20" stroke="none" fill="#000">Denied / read-only</text>
    <text x="16" y="96" font-size="11" stroke="none" fill="#666">Four denial patterns at mobile width.</text>
  </g>

  <!-- A: denied assignment picker (open sheet) -->
  <g data-region="pattern-a" transform="translate(16,128)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">A · ASSIGNEE PICKER</text>
    <text x="0" y="34" font-size="14" stroke="none" fill="#000">Out-of-scope agent</text>
    <g transform="translate(0,48)">
      <rect width="343" height="40" rx="4" />
      <text x="14" y="26" font-size="12" stroke="none" fill="#666">Search agents…</text>
      <text x="324" y="26" font-size="12" stroke="none" fill="#666" text-anchor="end">▾</text>
    </g>
    <g transform="translate(0,96)">
      <rect width="343" height="288" rx="4" />
      <text x="14" y="20" font-size="10" stroke="none" fill="#666">IN YOUR SCOPE</text>
      <g transform="translate(0,28)">
        <rect width="343" height="40" stroke="none" fill="#fafafa" />
        <text x="14" y="24" font-size="13" stroke="none" fill="#000">Engineer · Ada</text>
        <text x="328" y="24" font-size="10" stroke="none" fill="#666" text-anchor="end">in scope</text>
      </g>
      <line x1="0" y1="68" x2="343" y2="68" />
      <g transform="translate(0,68)">
        <rect width="343" height="40" stroke="none" fill="#fafafa" />
        <text x="14" y="24" font-size="13" stroke="none" fill="#000">Designer · Iris</text>
        <text x="328" y="24" font-size="10" stroke="none" fill="#666" text-anchor="end">in scope</text>
      </g>
      <line x1="0" y1="108" x2="343" y2="108" />
      <g transform="translate(0,108)">
        <rect width="343" height="40" stroke="none" fill="#fafafa" />
        <text x="14" y="24" font-size="13" stroke="none" fill="#000">Researcher · Vega</text>
        <g transform="translate(132,14)" stroke="#000" fill="none" stroke-width="1.2" aria-label="private agent">
          <title>Private agent</title>
          <rect x="0" y="5" width="11" height="9" rx="2" />
          <path d="M 2.5 5 V 3 a 3 3 0 0 1 6 0 V 5" />
        </g>
        <text x="328" y="24" font-size="10" stroke="none" fill="#666" text-anchor="end">in scope</text>
      </g>
      <line x1="0" y1="148" x2="343" y2="148" />
      <text x="14" y="170" font-size="10" stroke="none" fill="#666">OUTSIDE YOUR SCOPE</text>
      <g transform="translate(0,180)" opacity="0.45">
        <rect width="343" height="40" stroke="none" fill="#fff" />
        <text x="14" y="24" font-size="13" stroke="none" fill="#000">Engineer · Brio</text>
        <text x="328" y="24" font-size="10" stroke="none" fill="#666" text-anchor="end">out of scope</text>
      </g>
      <line x1="0" y1="220" x2="343" y2="220" />
      <g transform="translate(0,220)" opacity="0.45">
        <rect width="343" height="40" stroke="none" fill="#fff" />
        <text x="14" y="24" font-size="13" stroke="none" fill="#000">CMO · Sienna</text>
        <text x="328" y="24" font-size="10" stroke="none" fill="#666" text-anchor="end">out of scope</text>
      </g>
    </g>
  </g>

  <!-- A copy -->
  <g data-region="pattern-a-copy" transform="translate(16,516)">
    <rect width="343" height="116" rx="4" />
    <text x="16" y="24" font-size="11" stroke="none" fill="#666">COPY</text>
    <text x="16" y="44" font-size="13" stroke="none" fill="#000" font-weight="600">"This assignment is outside your scope."</text>
    <text x="16" y="64" font-size="11" stroke="none" fill="#666">Your scoped grant doesn't cover this project or</text>
    <text x="16" y="78" font-size="11" stroke="none" fill="#666">this agent. Ask Maya Chen to widen your grant.</text>
    <text x="16" y="100" font-size="10" stroke="none" fill="#666">No constraint name, no hidden id list.</text>
  </g>

  <!-- B: read-only config -->
  <g data-region="pattern-b" transform="translate(16,656)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">B · READ-ONLY CONFIG</text>
    <text x="0" y="34" font-size="14" stroke="none" fill="#000">Peer viewing board-only config</text>
    <g transform="translate(0,48)">
      <rect width="343" height="32" rx="16" fill="#e6e6e6" stroke="#666" />
      <text x="171" y="20" font-size="11" stroke="none" fill="#000" text-anchor="middle">View only · Board can edit this</text>
    </g>
    <g transform="translate(0,96)" opacity="0.7">
      <text x="0" y="12" font-size="11" stroke="none" fill="#666">ADAPTER</text>
      <g transform="translate(0,18)"><rect width="343" height="36" rx="4" /><text x="14" y="24" font-size="13" stroke="none" fill="#000">http</text></g>
      <text x="0" y="80" font-size="11" stroke="none" fill="#666">API KEY (secret ref)</text>
      <g transform="translate(0,86)"><rect width="343" height="36" rx="4" fill="#e6e6e6" stroke="#666" /><text x="14" y="24" font-size="13" stroke="none" fill="#000">anthropic_key_v3 · &lt;redacted&gt;</text></g>
    </g>
    <g transform="translate(0,256)">
      <rect width="343" height="116" rx="4" />
      <text x="16" y="24" font-size="12" stroke="none" fill="#000" font-weight="600">Why this is locked</text>
      <text x="16" y="44" font-size="11" stroke="none" fill="#666">Vega's config visibility is Board-only.</text>
      <text x="16" y="58" font-size="11" stroke="none" fill="#666">You're seeing the redacted peer view.</text>
      <g transform="translate(16,72)">
        <rect width="180" height="32" rx="4" />
        <text x="90" y="20" font-size="11" stroke="none" fill="#000" text-anchor="middle">Request edit from board</text>
      </g>
    </g>
  </g>

  <!-- C: denied toast -->
  <g data-region="pattern-c" transform="translate(16,1064)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">C · DENIED TOAST (after submit)</text>
    <text x="0" y="34" font-size="14" stroke="none" fill="#000">Server says no after the picker rendered</text>
    <g transform="translate(0,48)">
      <rect width="343" height="116" rx="4" />
      <text x="16" y="28" font-size="13" stroke="none" fill="#000" font-weight="600">Assignment denied — outside scope</text>
      <text x="16" y="48" font-size="11" stroke="none" fill="#666">Your scoped grant doesn't cover this assignment.</text>
      <text x="16" y="62" font-size="11" stroke="none" fill="#666">Ask Maya Chen if this should change.</text>
      <g transform="translate(16,76)">
        <rect width="68" height="24" rx="3" />
        <text x="34" y="16" font-size="11" stroke="none" fill="#000" text-anchor="middle">Dismiss</text>
        <rect x="76" width="148" height="24" rx="3" fill="#000" stroke="none" />
        <text x="150" y="16" font-size="11" stroke="none" fill="#fff" text-anchor="middle">Ask Maya Chen</text>
      </g>
    </g>
  </g>

  <!-- D: activity log entry -->
  <g data-region="pattern-d" transform="translate(16,1252)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">D · NON-LEAKING ACTIVITY ENTRY</text>
    <text x="0" y="34" font-size="14" stroke="none" fill="#000">Audit row shape</text>
    <g transform="translate(0,48)">
      <rect width="343" height="116" rx="4" />
      <g font-size="12" stroke="none">
        <text x="16" y="26" fill="#000">2026-05-15 10:42 · Jordan Park</text>
        <text x="16" y="44" fill="#666">attempted task assignment</text>
        <text x="16" y="62" fill="#000">→ denied (scope)</text>
      </g>
      <g transform="translate(16,72)">
        <rect width="311" height="32" fill="#e6e6e6" stroke="#666" />
        <text x="8" y="20" font-size="10" stroke="none" fill="#000">No target id, project id, or constraint name leaked.</text>
      </g>
    </g>
  </g>

  <!-- footer note -->
  <g data-region="footer-note" transform="translate(16,1432)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">All four patterns share one rule: name the unblock owner, not the missing resource.</text>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="32" cy="320" r="9" />
    <circle cx="32" cy="540" r="9" />
    <circle cx="32" cy="692" r="9" />
    <circle cx="32" cy="916" r="9" />
    <circle cx="32" cy="1088" r="9" />
    <circle cx="32" cy="1276" r="9" />
  </g>
  <g font-size="10" stroke="none" fill="#d33">
    <text x="46" y="324">1</text>
    <text x="46" y="544">2</text>
    <text x="46" y="696">3</text>
    <text x="46" y="920">4</text>
    <text x="46" y="1092">5</text>
    <text x="46" y="1280">6</text>
  </g>
</svg>
