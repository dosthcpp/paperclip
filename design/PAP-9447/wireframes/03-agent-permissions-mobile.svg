<svg xmlns="http://www.w3.org/2000/svg" width="375" height="1700" viewBox="0 0 375 1700"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="1700" />

  <!-- 1: top bar -->
  <g data-region="topbar">
    <line x1="0" y1="44" x2="375" y2="44" />
    <text x="16" y="76" font-size="12" stroke="none" fill="#666">←  Agents</text>
  </g>

  <!-- 2: agent header -->
  <g data-region="agent-header" transform="translate(16,96)">
    <rect width="36" height="36" rx="18" fill="#e6e6e6" stroke="#666" />
    <text x="52" y="20" font-size="16" stroke="none" fill="#000">Researcher · Vega</text>
    <g transform="translate(228,4)"><rect width="56" height="20" rx="3" fill="#e6e6e6" stroke="#666" /><text x="28" y="14" font-size="10" stroke="none" fill="#000" text-anchor="middle">private</text></g>
    <text x="52" y="36" font-size="11" stroke="none" fill="#666">claude-haiku · reports CTO Atlas</text>
  </g>

  <!-- 3: subnav scroll tabs -->
  <g data-region="agent-tabs" transform="translate(16,152)">
    <line x1="0" y1="32" x2="343" y2="32" />
    <g font-size="12" stroke="none">
      <text x="0" y="20" fill="#666">Overview</text>
      <text x="68" y="20" fill="#666">Config</text>
      <text x="120" y="20" fill="#000" font-weight="600">Permissions</text>
      <line x1="116" y1="32" x2="208" y2="32" stroke="#000" stroke-width="2.5" />
      <text x="220" y="20" fill="#666">Budget</text>
      <text x="276" y="20" fill="#666">Runs ›</text>
    </g>
  </g>

  <!-- 4: Private marker card -->
  <g data-region="private-marker" transform="translate(16,200)">
    <rect width="343" height="148" rx="4" />
    <text x="16" y="24" font-size="13" stroke="none" fill="#000" font-weight="600">Private agent marker</text>
    <g transform="translate(287,12)">
      <rect width="56" height="28" rx="14" fill="#000" />
      <circle cx="42" cy="14" r="11" fill="#fff" stroke="#000" />
      <text x="12" y="18" font-size="10" fill="#fff" stroke="none">ON</text>
    </g>
    <text x="16" y="48" font-size="11" stroke="none" fill="#000" font-weight="600">Agent privacy does not hide work.</text>
    <text x="16" y="68" font-size="11" stroke="none" fill="#666">Hides Vega's profile and config from</text>
    <text x="16" y="82" font-size="11" stroke="none" fill="#666">non-board peers.</text>
    <text x="16" y="106" font-size="11" stroke="none" fill="#666">Issues, comments, and work products</text>
    <text x="16" y="120" font-size="11" stroke="none" fill="#666">stay company-visible.</text>
    <text x="16" y="140" font-size="11" stroke="none" fill="#000">Learn more →</text>
  </g>

  <!-- 5: profile visibility -->
  <g data-region="profile-visibility" transform="translate(16,376)">
    <rect width="343" height="180" rx="4" />
    <text x="16" y="22" font-size="11" stroke="none" fill="#666">1 · PROFILE VISIBILITY</text>
    <text x="16" y="44" font-size="14" stroke="none" fill="#000">Who can see this agent's identity</text>
    <g transform="translate(16,60)">
      <g><circle cx="8" cy="8" r="7" /><text x="22" y="12" font-size="12" stroke="none" fill="#666">Company-visible</text></g>
      <g transform="translate(0,24)"><circle cx="8" cy="8" r="7" fill="#000" /><circle cx="8" cy="8" r="2.5" fill="#fff" stroke="none" /><text x="22" y="12" font-size="12" stroke="none" fill="#000">Board-only</text></g>
    </g>
    <g transform="translate(16,128)">
      <rect width="311" height="40" fill="#e6e6e6" stroke="#666" />
      <text x="8" y="16" font-size="10" stroke="none" fill="#000">Shown to: Board · Maya</text>
      <text x="8" y="30" font-size="10" stroke="none" fill="#000">Chen · Jordan Park · CTO Atlas</text>
    </g>
  </g>

  <!-- 6: config visibility -->
  <g data-region="config-visibility" transform="translate(16,584)">
    <rect width="343" height="200" rx="4" />
    <text x="16" y="22" font-size="11" stroke="none" fill="#666">2 · CONFIG VISIBILITY &amp; REDACTION</text>
    <text x="16" y="44" font-size="14" stroke="none" fill="#000">Who reads the runtime config</text>
    <text x="16" y="62" font-size="11" stroke="none" fill="#666">Secret fields always redacted in UI.</text>
    <g transform="translate(16,76)">
      <g><circle cx="8" cy="8" r="7" /><text x="22" y="12" font-size="12" stroke="none" fill="#666">Company</text></g>
      <g transform="translate(0,24)"><circle cx="8" cy="8" r="7" fill="#000" /><circle cx="8" cy="8" r="2.5" fill="#fff" stroke="none" /><text x="22" y="12" font-size="12" stroke="none" fill="#000">Board-only</text></g>
    </g>
    <g transform="translate(16,148)">
      <rect width="311" height="40" fill="#e6e6e6" stroke="#666" />
      <text x="8" y="16" font-size="10" stroke="none" fill="#000">api_key=&lt;secret · anthropic_key_v3&gt;</text>
      <text x="8" y="30" font-size="10" stroke="none" fill="#000">bearer_token=&lt;secret · vega_http&gt;</text>
    </g>
  </g>

  <!-- 7: assignment/invocation -->
  <g data-region="assignment" transform="translate(16,812)">
    <rect width="343" height="208" rx="4" />
    <text x="16" y="22" font-size="11" stroke="none" fill="#666">3 · ASSIGNMENT / INVOCATION</text>
    <text x="16" y="44" font-size="14" stroke="none" fill="#000">Who can hand work to Vega</text>
    <g transform="translate(16,60)">
      <text x="0" y="14" font-size="11" stroke="none" fill="#666">CAN ASSIGN TASKS</text>
      <g transform="translate(0,22)">
        <rect width="76" height="22" rx="11" fill="#e6e6e6" stroke="#666" /><text x="38" y="15" font-size="11" stroke="none" fill="#000" text-anchor="middle">Board</text>
        <rect x="84" width="116" height="22" rx="11" fill="#e6e6e6" stroke="#666" /><text x="142" y="15" font-size="11" stroke="none" fill="#000" text-anchor="middle">CTO · Atlas</text>
      </g>
    </g>
    <g transform="translate(16,132)">
      <text x="0" y="14" font-size="11" stroke="none" fill="#666">CAN INVOKE (manual heartbeat)</text>
      <g transform="translate(0,22)">
        <rect width="116" height="22" rx="11" fill="#e6e6e6" stroke="#666" /><text x="58" y="15" font-size="11" stroke="none" fill="#000" text-anchor="middle">CTO · Atlas</text>
      </g>
    </g>
  </g>

  <!-- 8: tool/secret policy -->
  <g data-region="tools" transform="translate(16,1048)">
    <rect width="343" height="240" rx="4" />
    <text x="16" y="22" font-size="11" stroke="none" fill="#666">4 · TOOL / SECRET POLICY</text>
    <text x="16" y="44" font-size="14" stroke="none" fill="#000">What Vega can run and read</text>
    <g transform="translate(16,60)">
      <text x="0" y="14" font-size="11" stroke="none" fill="#666">ALLOWED TOOLS</text>
      <g transform="translate(0,22)" font-size="11">
        <rect width="72" height="22" rx="3" /><text x="36" y="15" stroke="none" fill="#000" text-anchor="middle">web_fetch</text>
        <rect x="80" width="80" height="22" rx="3" /><text x="120" y="15" stroke="none" fill="#000" text-anchor="middle">web_search</text>
        <rect x="168" width="120" height="22" rx="3" /><text x="228" y="15" stroke="none" fill="#000" text-anchor="middle">file_read (sandbox)</text>
      </g>
    </g>
    <g transform="translate(16,124)">
      <text x="0" y="14" font-size="11" stroke="none" fill="#666">SECRET REFS</text>
      <g transform="translate(0,22)" font-size="11">
        <rect width="132" height="22" rx="3" /><text x="66" y="15" stroke="none" fill="#000" text-anchor="middle">anthropic_key_v3</text>
        <rect x="140" width="84" height="22" rx="3" /><text x="182" y="15" stroke="none" fill="#000" text-anchor="middle">vega_http</text>
      </g>
    </g>
    <g transform="translate(16,184)">
      <rect width="311" height="40" fill="#e6e6e6" stroke="#666" />
      <text x="8" y="16" font-size="10" stroke="none" fill="#000">Tools requiring missing scopes are</text>
      <text x="8" y="30" font-size="10" stroke="none" fill="#000">filtered from the picker. Logs redact secrets.</text>
    </g>
  </g>

  <!-- 9: escalation -->
  <g data-region="escalation" transform="translate(16,1316)">
    <rect width="343" height="260" rx="4" />
    <text x="16" y="22" font-size="11" stroke="none" fill="#666">5 · ESCALATION AUTHORITY</text>
    <text x="16" y="44" font-size="14" stroke="none" fill="#000">Where refusals and blockers route</text>
    <g transform="translate(16,68)" font-size="12">
      <g>
        <rect width="312" height="32" />
        <text x="156" y="20" stroke="none" fill="#000" text-anchor="middle">Researcher · Vega</text>
      </g>
      <g transform="translate(0,40)">
        <line x1="156" y1="0" x2="156" y2="12" />
        <text x="156" y="22" font-size="11" stroke="none" fill="#666" text-anchor="middle">↓ refusal / blocked</text>
      </g>
      <g transform="translate(0,68)">
        <rect width="312" height="32" />
        <text x="156" y="20" stroke="none" fill="#000" text-anchor="middle">CTO · Atlas · manager</text>
      </g>
      <g transform="translate(0,108)">
        <line x1="156" y1="0" x2="156" y2="12" />
        <text x="156" y="22" font-size="11" stroke="none" fill="#666" text-anchor="middle">↓ if unresolved</text>
      </g>
      <g transform="translate(0,136)">
        <rect width="312" height="32" />
        <text x="156" y="20" stroke="none" fill="#000" text-anchor="middle">CEO · Helios → Board</text>
      </g>
      <text x="0" y="188" font-size="10" stroke="none" fill="#666">Each hop writes to activity_log.</text>
    </g>
  </g>

  <!-- 10: audit -->
  <g data-region="audit" transform="translate(16,1604)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">View recent permission changes →</text>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="32" cy="224" r="9" />
    <circle cx="32" cy="392" r="9" />
    <circle cx="32" cy="604" r="9" />
    <circle cx="32" cy="828" r="9" />
    <circle cx="32" cy="1068" r="9" />
    <circle cx="32" cy="1336" r="9" />
  </g>
  <g font-size="10" stroke="none" fill="#d33">
    <text x="46" y="228">0</text>
    <text x="46" y="396">1</text>
    <text x="46" y="608">2</text>
    <text x="46" y="832">3</text>
    <text x="46" y="1072">4</text>
    <text x="46" y="1340">5</text>
  </g>
</svg>
