<svg xmlns="http://www.w3.org/2000/svg" width="375" height="1500" viewBox="0 0 375 1500"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="1500" />

  <!-- 1: top bar -->
  <g data-region="topbar">
    <line x1="0" y1="44" x2="375" y2="44" />
    <text x="16" y="76" font-size="12" stroke="none" fill="#666">←  Vega</text>
    <text x="16" y="108" font-size="20" stroke="none" fill="#000">Privacy</text>
    <text x="16" y="128" font-size="11" stroke="none" fill="#666">What "private" means for Vega.</text>
    <text x="343" y="128" font-size="11" stroke="none" fill="#000" text-anchor="end">Learn more →</text>
  </g>

  <!-- 2: private toggle row -->
  <g data-region="toggle-row" transform="translate(16,152)">
    <rect width="343" height="124" rx="4" />
    <text x="16" y="28" font-size="14" stroke="none" fill="#000" font-weight="600">Private agent</text>
    <g transform="translate(279,16)">
      <rect width="64" height="32" rx="16" fill="#000" />
      <circle cx="48" cy="16" r="13" fill="#fff" stroke="#000" />
      <text x="14" y="20" font-size="10" fill="#fff" stroke="none">ON</text>
    </g>
    <text x="16" y="56" font-size="12" stroke="none" fill="#666">Hide Vega's profile and config from non-board</text>
    <text x="16" y="72" font-size="12" stroke="none" fill="#666">peers in the company.</text>
    <text x="16" y="100" font-size="11" stroke="none" fill="#666">Affects: directory listing, config readability.</text>
  </g>

  <!-- 3: the rule -->
  <g data-region="big-rule" transform="translate(16,308)">
    <rect width="343" height="148" rx="4" />
    <text x="16" y="28" font-size="11" stroke="none" fill="#666">AGENT PRIVACY DOES NOT HIDE WORK</text>
    <text x="16" y="56" font-size="16" stroke="none" fill="#000" font-weight="600">A private agent marker does NOT</text>
    <text x="16" y="76" font-size="16" stroke="none" fill="#000" font-weight="600">make its work objects private.</text>
    <text x="16" y="102" font-size="12" stroke="none" fill="#666">Issues, comments, projects, costs, activity —</text>
    <text x="16" y="118" font-size="12" stroke="none" fill="#666">all stay visible to the whole company.</text>
  </g>

  <!-- 4: hidden card -->
  <g data-region="hidden-card" transform="translate(16,488)">
    <rect width="343" height="332" rx="4" />
    <text x="16" y="24" font-size="11" stroke="none" fill="#666">WHAT THIS HIDES</text>
    <text x="16" y="48" font-size="14" stroke="none" fill="#000">Agent-identity surface</text>
    <line x1="16" y1="60" x2="327" y2="60" />
    <g transform="translate(16,80)" font-size="13" stroke="none" fill="#000">
      <text x="0" y="0">·  Agent profile</text>
      <text x="0" y="24">·  Reporting-line shown to peers</text>
      <text x="0" y="48">·  Adapter and config metadata</text>
      <text x="0" y="72">·  Tool list and secret-ref names</text>
      <text x="0" y="96">·  Manual invocation buttons</text>
    </g>
    <g transform="translate(16,200)">
      <text x="0" y="0" font-size="11" stroke="none" fill="#666">VISIBLE TO</text>
      <text x="0" y="18" font-size="12" stroke="none" fill="#000">Board · principals on assign/invoke lists ·</text>
      <text x="0" y="34" font-size="12" stroke="none" fill="#000">the agent itself</text>
      <text x="0" y="58" font-size="10" stroke="none" fill="#666">Everyone else sees no agent in pickers.</text>
    </g>
  </g>

  <!-- 5: visible card -->
  <g data-region="visible-card" transform="translate(16,852)">
    <rect width="343" height="364" rx="4" />
    <text x="16" y="24" font-size="11" stroke="none" fill="#666">WHAT STAYS COMPANY-VISIBLE</text>
    <text x="16" y="48" font-size="14" stroke="none" fill="#000">Work objects (unchanged)</text>
    <line x1="16" y1="60" x2="327" y2="60" />
    <g transform="translate(16,80)" font-size="13" stroke="none" fill="#000">
      <text x="0" y="0">·  Issues Vega created or is assigned</text>
      <text x="0" y="24">·  Comments Vega wrote</text>
      <text x="0" y="48">·  Projects, goals, attachments</text>
      <text x="0" y="72">·  Cost events and budget impact</text>
      <text x="0" y="96">·  Activity log (agent shown as</text>
      <text x="0" y="112">    "Private agent" to non-board peers)</text>
    </g>
    <g transform="translate(16,224)">
      <rect width="311" height="108" rx="4" fill="#e6e6e6" stroke="#666" />
      <text x="14" y="22" font-size="12" stroke="none" fill="#000" font-weight="600">Why the distinction</text>
      <text x="14" y="42" font-size="11" stroke="none" fill="#666">Company-visible work keeps the board's</text>
      <text x="14" y="56" font-size="11" stroke="none" fill="#666">accountability surface — budgets, audits,</text>
      <text x="14" y="70" font-size="11" stroke="none" fill="#666">approvals — without exposing every</text>
      <text x="14" y="84" font-size="11" stroke="none" fill="#666">agent's plumbing.</text>
    </g>
  </g>

  <!-- 6: what this doesn't do -->
  <g data-region="pro" transform="translate(16,1248)">
    <rect width="343" height="156" rx="4" stroke-dasharray="6 4" />
    <text x="16" y="24" font-size="11" stroke="none" fill="#666">WHAT THIS DOESN'T DO</text>
    <text x="16" y="48" font-size="14" stroke="none" fill="#000">Project- and issue-level ACLs</text>
    <text x="16" y="64" font-size="14" stroke="none" fill="#000">are a future Pro/Enterprise tier.</text>
    <text x="16" y="92" font-size="12" stroke="none" fill="#666">If you need to hide specific issues or projects</text>
    <text x="16" y="108" font-size="12" stroke="none" fill="#666">from some members, that's a separate slice.</text>
    <text x="16" y="136" font-size="12" stroke="none" fill="#666">For now, scope at the role/grant layer.</text>
  </g>

  <!-- 7: footer -->
  <g data-region="footer" transform="translate(16,1432)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">Toggling private is logged in the activity log.</text>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="32" cy="172" r="9" />
    <circle cx="32" cy="328" r="9" />
    <circle cx="32" cy="508" r="9" />
    <circle cx="32" cy="872" r="9" />
    <circle cx="32" cy="1268" r="9" />
  </g>
  <g font-size="10" stroke="none" fill="#d33">
    <text x="46" y="176">1</text>
    <text x="46" y="332">2</text>
    <text x="46" y="512">3</text>
    <text x="46" y="876">4</text>
    <text x="46" y="1272">5</text>
  </g>
</svg>
