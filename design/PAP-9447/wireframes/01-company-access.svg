    <text x="240" y="34" font-size="12" stroke="none" fill="#666">Company › Settings › Access</text>
    <g transform="translate(1144,12)">
      <rect width="112" height="32" rx="4" />
      <text x="56" y="20" font-size="12" stroke="none" fill="#000" text-anchor="middle">+ Invite</text>
    </g>
  </g>

  <!-- 2: side nav -->
