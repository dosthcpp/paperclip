    <rect width="1000" height="72" rx="4" />
    <g transform="translate(20,28)">
      <text x="0" y="0" font-size="14" stroke="none" fill="#000" font-weight="600">Roles and grants control who can act — not what they see.</text>
      <circle cx="378" cy="-6" r="8" fill="#fff" stroke="#666" />
      <text x="378" y="-2" font-size="11" stroke="none" fill="#666" text-anchor="middle">?</text>
    </g>
    <text x="20" y="48" font-size="13" stroke="none" fill="#666">Use them to decide who can assign tasks, manage agents, or edit config. Issues, comments, and projects stay</text>
    <text x="20" y="64" font-size="13" stroke="none" fill="#666">visible to the whole company so the board can audit work.</text>
    <text x="936" y="44" font-size="12" stroke="none" fill="#666" text-anchor="end">Learn more →</text>
