    <text x="0" y="32" font-size="28" stroke="none" fill="#000">Company access</text>
    <text x="0" y="64" font-size="14" stroke="none" fill="#666">Manage humans, agents, roles, and scoped grants for Acme AI Co.</text>
  </g>

