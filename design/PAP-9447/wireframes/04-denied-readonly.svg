<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1320" viewBox="0 0 1280 1320"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="1320" />

  <!-- 1: top bar -->
  <g data-region="topbar">
    <rect x="0" y="0" width="1280" height="56" />
    <text x="24" y="34" font-size="14" stroke="none" fill="#000">Paperclip · Acme AI Co.</text>
  </g>

  <text x="48" y="100" font-size="28" stroke="none" fill="#000">Denied and read-only patterns</text>
  <text x="48" y="124" font-size="13" stroke="none" fill="#666">Four moments where the product must explain a no without leaking what it knows. Each pattern keeps the schema generic, names the path forward, and stays attached to a real workflow.</text>

  <!-- PATTERN A: denied assignment inline -->
  <g data-region="pattern-a" transform="translate(48,160)">
    <text x="0" y="16" font-size="12" stroke="none" fill="#666">A · DENIED ASSIGNMENT — INLINE PICKER</text>
    <text x="0" y="40" font-size="20" stroke="none" fill="#000">Out-of-scope agent in the picker</text>
    <text x="0" y="60" font-size="13" stroke="none" fill="#666">Jordan opens the assignee dropdown on a task. Agents outside his tasks:assign_scope are shown but unselectable.</text>

    <!-- mock task panel -->
    <g transform="translate(0,88)">
      <rect width="584" height="472" rx="4" />
      <line x1="0" y1="60" x2="584" y2="60" />
      <text x="20" y="28" font-size="14" stroke="none" fill="#000">PAP-9447 · Wireframe permissions UX site</text>
      <text x="20" y="48" font-size="12" stroke="none" fill="#666">Project: Onboarding · Reporter: Maya · Priority: medium</text>

      <text x="20" y="92" font-size="12" stroke="none" fill="#666">ASSIGNEE</text>
      <g transform="translate(20,104)">
        <rect width="544" height="40" rx="4" />
        <text x="14" y="26" font-size="13" stroke="none" fill="#666">Search agents or members…</text>
        <text x="524" y="26" font-size="13" stroke="none" fill="#666" text-anchor="end">▾</text>
      </g>

      <!-- dropdown open below -->
      <g transform="translate(20,152)">
        <rect width="544" height="288" rx="4" />
        <text x="14" y="22" font-size="11" stroke="none" fill="#666">AGENTS — IN YOUR SCOPE</text>
        <g transform="translate(0,32)">
          <rect width="544" height="40" stroke="none" fill="#fafafa" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">Engineer · Ada</text>
          <text x="530" y="24" font-size="11" stroke="none" fill="#666" text-anchor="end">in scope</text>
        </g>
        <g transform="translate(0,72)">
          <line x1="0" y1="0" x2="544" y2="0" />
          <rect width="544" height="40" stroke="none" fill="#fafafa" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">Designer · Iris</text>
          <text x="530" y="24" font-size="11" stroke="none" fill="#666" text-anchor="end">in scope</text>
        </g>
        <g transform="translate(0,112)">
          <line x1="0" y1="0" x2="544" y2="0" />
          <rect width="544" height="40" stroke="none" fill="#fafafa" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">Researcher · Vega</text>
          <!-- private lock icon — accessible label via aria-label/title -->
          <g transform="translate(140,12)" stroke="#000" fill="none" stroke-width="1.4" aria-label="private agent">
            <title>Private agent</title>
            <rect x="0" y="6" width="14" height="11" rx="2" />
            <path d="M 3 6 V 3 a 4 4 0 0 1 8 0 V 6" />
          </g>
          <text x="530" y="24" font-size="11" stroke="none" fill="#666" text-anchor="end">in scope</text>
        </g>
        <line x1="0" y1="152" x2="544" y2="152" />
        <text x="14" y="174" font-size="11" stroke="none" fill="#666">OUTSIDE YOUR SCOPE — NOT SELECTABLE</text>
        <g transform="translate(0,184)" opacity="0.45">
          <rect width="544" height="40" stroke="none" fill="#fff" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">Engineer · Brio</text>
          <text x="530" y="24" font-size="11" stroke="none" fill="#666" text-anchor="end">out of scope</text>
        </g>
        <g transform="translate(0,224)" opacity="0.45">
          <line x1="0" y1="0" x2="544" y2="0" />
          <rect width="544" height="40" stroke="none" fill="#fff" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">CMO · Sienna</text>
          <text x="530" y="24" font-size="11" stroke="none" fill="#666" text-anchor="end">out of scope</text>
        </g>
      </g>
    </g>

    <!-- copy panel -->
    <g transform="translate(608,88)">
      <rect width="576" height="472" rx="4" />
      <text x="20" y="28" font-size="12" stroke="none" fill="#666">COPY GUIDELINES</text>
      <text x="20" y="56" font-size="14" stroke="none" fill="#000">Tell the operator…</text>

      <g transform="translate(20,72)">
        <rect width="536" height="84" rx="4" />
        <text x="16" y="24" font-size="13" stroke="none" fill="#000" font-weight="600">"This assignment is outside your scope."</text>
        <text x="16" y="44" font-size="12" stroke="none" fill="#666">Your scoped grant doesn't cover this project or this agent.</text>
        <text x="16" y="64" font-size="12" stroke="none" fill="#666">Ask Maya Chen to widen your grant or assign the task themselves.</text>
      </g>

      <text x="20" y="184" font-size="14" stroke="none" fill="#000">Don't…</text>
      <g transform="translate(20,200)" font-size="12" stroke="none" fill="#666">
        <text x="0" y="14">— name the constraint that failed (project, agent, subtree)</text>
        <text x="0" y="34">— list hidden projects, agents, or subtrees</text>
        <text x="0" y="54">— surface the raw permission key in the toast</text>
      </g>

      <text x="20" y="288" font-size="14" stroke="none" fill="#000">Why generic</text>
      <text x="20" y="308" font-size="12" stroke="none" fill="#666">Denials surface as a single calm sentence plus a named</text>
      <text x="20" y="324" font-size="12" stroke="none" fill="#666">owner who can unblock — the server returns a generic</text>
      <text x="20" y="340" font-size="12" stroke="none" fill="#666">scope explanation that doesn't leak hidden resources.</text>

      <g transform="translate(20,372)">
        <rect width="220" height="36" rx="4" />
        <text x="110" y="22" font-size="12" stroke="none" fill="#000" text-anchor="middle">Request wider scope</text>
        <rect x="232" width="180" height="36" rx="4" fill="#000" stroke="none" />
        <text x="322" y="22" font-size="12" stroke="none" fill="#fff" text-anchor="middle">Ask Maya Chen</text>
      </g>
      <text x="20" y="430" font-size="11" stroke="none" fill="#666">Both actions are real affordances — the Ask Maya button opens a draft comment on the failing task.</text>
    </g>
  </g>

  <!-- PATTERN B: read-only agent config -->
  <g data-region="pattern-b" transform="translate(48,576)">
    <text x="0" y="16" font-size="12" stroke="none" fill="#666">B · READ-ONLY CONFIG PANEL</text>
    <text x="0" y="40" font-size="20" stroke="none" fill="#000">Non-board peer viewing a board-only config</text>
    <text x="0" y="60" font-size="13" stroke="none" fill="#666">Peer agents and operators can read non-secret config, but can't edit. Board can.</text>

    <g transform="translate(0,88)">
      <rect width="1184" height="328" rx="4" />
      <line x1="0" y1="48" x2="1184" y2="48" />
      <text x="20" y="30" font-size="14" stroke="none" fill="#000">Vega · Config</text>
      <g transform="translate(960,12)">
        <rect width="208" height="24" rx="12" fill="#e6e6e6" stroke="#666" />
        <text x="104" y="16" font-size="11" stroke="none" fill="#000" text-anchor="middle">View only · Board can edit this</text>
      </g>

      <g transform="translate(20,68)" opacity="0.7">
        <text x="0" y="14" font-size="12" stroke="none" fill="#666">ADAPTER</text>
        <g transform="translate(0,22)">
          <rect width="380" height="36" rx="4" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">http</text>
          <text x="370" y="24" font-size="13" stroke="none" fill="#666" text-anchor="end">▾</text>
        </g>
        <text x="0" y="84" font-size="12" stroke="none" fill="#666">INSTRUCTIONS PATH</text>
        <g transform="translate(0,92)">
          <rect width="380" height="36" rx="4" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">/agents/researcher/AGENTS.md</text>
        </g>
        <text x="0" y="154" font-size="12" stroke="none" fill="#666">API KEY (secret ref)</text>
        <g transform="translate(0,162)">
          <rect width="380" height="36" rx="4" fill="#e6e6e6" stroke="#666" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">anthropic_key_v3 · &lt;redacted&gt;</text>
        </g>
        <text x="0" y="224" font-size="12" stroke="none" fill="#666">LOOP BEHAVIOR</text>
        <g transform="translate(0,232)">
          <rect width="380" height="36" rx="4" />
          <text x="14" y="24" font-size="13" stroke="none" fill="#000">heartbeat · 10m idle</text>
        </g>
      </g>

      <g transform="translate(420,68)">
        <rect width="744" height="234" rx="4" />
        <text x="16" y="26" font-size="12" stroke="none" fill="#666">WHY THIS IS LOCKED</text>
        <text x="16" y="50" font-size="14" stroke="none" fill="#000">Vega's config visibility is Board-only.</text>
        <text x="16" y="76" font-size="12" stroke="none" fill="#666">Maya Chen (board) can edit. You're seeing the redacted view non-board peers receive.</text>

        <text x="16" y="116" font-size="12" stroke="none" fill="#666">SECRET REDACTION RULE</text>
        <g transform="translate(16,124)">
          <rect width="712" height="48" rx="4" fill="#e6e6e6" stroke="#666" />
          <text x="12" y="20" font-size="12" stroke="none" fill="#000">Secret-ref fields are always shown as &lt;redacted&gt;.</text>
          <text x="12" y="36" font-size="12" stroke="none" fill="#666">Activity log, run output, and exports apply the same rule. No raw values ever surface to peers.</text>
        </g>

        <g transform="translate(16,188)">
          <rect width="220" height="34" rx="4" />
          <text x="110" y="22" font-size="12" stroke="none" fill="#000" text-anchor="middle">Request edit from board</text>
        </g>
      </g>
    </g>
  </g>

  <!-- PATTERN C + D: composite -->
  <g data-region="pattern-cd" transform="translate(48,968)">
    <text x="0" y="16" font-size="12" stroke="none" fill="#666">C · DENIED MUTATION — TOAST · D · NON-LEAKING ACTIVITY ENTRY</text>
    <text x="0" y="40" font-size="20" stroke="none" fill="#000">After-the-fact: failed assignment in flight</text>
    <text x="0" y="60" font-size="13" stroke="none" fill="#666">If the scope changes between picker render and submit, the server still says no. The toast and activity entry use the same generic shape.</text>

    <g transform="translate(0,88)">
      <rect width="584" height="240" rx="4" />
      <line x1="0" y1="48" x2="584" y2="48" />
      <text x="20" y="30" font-size="14" stroke="none" fill="#000">Toast</text>
      <g transform="translate(20,68)">
        <rect width="544" height="100" rx="4" />
        <text x="16" y="24" font-size="13" stroke="none" fill="#000" font-weight="600">Assignment denied — outside your scope</text>
        <text x="16" y="44" font-size="12" stroke="none" fill="#666">Your scoped grant doesn't cover this assignment.</text>
        <text x="16" y="60" font-size="12" stroke="none" fill="#666">Ask Maya Chen if this should change.</text>
        <g transform="translate(16,72)">
          <rect width="68" height="22" rx="3" /><text x="34" y="15" font-size="11" stroke="none" fill="#000" text-anchor="middle">Dismiss</text>
          <rect x="76" width="132" height="22" rx="3" fill="#000" stroke="none" /><text x="142" y="15" font-size="11" stroke="none" fill="#fff" text-anchor="middle">Ask Maya Chen</text>
        </g>
      </g>
      <text x="20" y="190" font-size="11" stroke="none" fill="#666">PROHIBITED COPY</text>
      <text x="20" y="210" font-size="12" stroke="none" fill="#666">— "Project X is not in your allowed projects"</text>
      <text x="20" y="226" font-size="12" stroke="none" fill="#666">Leaks resource shape. Stay generic; name the unblock owner instead.</text>
    </g>

    <g transform="translate(608,88)">
      <rect width="576" height="240" rx="4" />
      <line x1="0" y1="48" x2="576" y2="48" />
      <text x="20" y="30" font-size="14" stroke="none" fill="#000">Activity log entry</text>
      <g transform="translate(20,68)" font-size="12" stroke="none">
        <text x="0" y="14" fill="#000">2026-05-15 10:42 · Jordan Park</text>
        <text x="0" y="34" fill="#666">attempted task assignment</text>
        <text x="0" y="54" fill="#000">→ denied (scope)</text>
      </g>
      <g transform="translate(20,144)">
        <rect width="536" height="76" rx="4" fill="#e6e6e6" stroke="#666" />
        <text x="12" y="20" font-size="11" stroke="none" fill="#000">Log shows: actor · action · outcome.</text>
        <text x="12" y="36" font-size="11" stroke="none" fill="#666">Does NOT show: target agent id, project id, or which constraint family failed.</text>
        <text x="12" y="56" font-size="11" stroke="none" fill="#666">Board sees full detail in audit export.</text>
      </g>
    </g>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="66" cy="316" r="10" />
    <circle cx="66" cy="436" r="10" />
    <circle cx="624" cy="312" r="10" />
    <circle cx="66" cy="606" r="10" />
    <circle cx="976" cy="592" r="10" />
    <circle cx="66" cy="996" r="10" />
    <circle cx="624" cy="996" r="10" />
  </g>
  <g font-size="11" stroke="none" fill="#d33">
    <text x="82" y="320">1</text>
    <text x="82" y="440">2</text>
    <text x="640" y="316">3</text>
    <text x="82" y="610">4</text>
    <text x="992" y="596">5</text>
    <text x="82" y="1000">6</text>
    <text x="640" y="1000">7</text>
  </g>
</svg>
