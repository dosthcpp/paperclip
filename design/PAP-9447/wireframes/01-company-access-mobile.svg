<svg xmlns="http://www.w3.org/2000/svg" width="375" height="1180" viewBox="0 0 375 1180"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="1180" />

  <!-- 1: status bar + top bar -->
  <g data-region="topbar">
    <line x1="0" y1="44" x2="375" y2="44" />
    <text x="16" y="76" font-size="14" stroke="none" fill="#000">Access</text>
    <text x="16" y="94" font-size="11" stroke="none" fill="#666">Settings › Access</text>
    <g transform="translate(343,52)"><rect x="-24" y="0" width="24" height="24" /><text x="-12" y="16" font-size="14" stroke="none" fill="#000" text-anchor="middle">≡</text></g>
  </g>

  <!-- 2: tabs -->
  <g data-region="tabs" transform="translate(16,120)">
    <line x1="0" y1="32" x2="343" y2="32" />
    <g font-size="12" stroke="none">
      <text x="0" y="20" fill="#000" font-weight="600">Members</text>
      <line x1="-2" y1="32" x2="62" y2="32" stroke="#000" stroke-width="2.5" />
      <text x="84" y="20" fill="#666">Roles</text>
      <text x="140" y="20" fill="#666">Invites</text>
      <text x="208" y="20" fill="#666">Joins · 2</text>
    </g>
  </g>

  <!-- 3: visibility note -->
  <g data-region="visibility-banner" transform="translate(16,176)">
    <rect width="343" height="88" rx="4" />
    <text x="16" y="24" font-size="13" stroke="none" fill="#000" font-weight="600">Roles control who can act — not what they see.</text>
    <text x="16" y="44" font-size="11" stroke="none" fill="#666">Use grants to decide who can assign tasks,</text>
    <text x="16" y="58" font-size="11" stroke="none" fill="#666">manage agents, or edit config. Issues and</text>
    <text x="16" y="72" font-size="11" stroke="none" fill="#666">projects stay company-visible. Learn more →</text>
  </g>

  <!-- 4: Humans header -->
  <g data-region="humans-header" transform="translate(16,288)">
    <text x="0" y="20" font-size="18" stroke="none" fill="#000">Humans · 5</text>
    <text x="343" y="18" font-size="12" stroke="none" fill="#000" text-anchor="end">+ Invite</text>
  </g>

  <!-- 5: Humans cards -->
  <g data-region="humans-card-1" transform="translate(16,320)">
    <rect width="343" height="116" rx="4" />
    <g stroke="none">
      <text x="16" y="28" font-size="14" fill="#000" font-weight="600">Maya Chen</text>
      <text x="16" y="46" font-size="12" fill="#666">maya@acme.ai · you</text>
      <g transform="translate(16,58)">
        <rect width="60" height="22" rx="11" /><text x="30" y="15" font-size="11" fill="#000" text-anchor="middle">Owner</text>
        <rect x="68" width="58" height="22" rx="11" /><text x="97" y="15" font-size="11" fill="#000" text-anchor="middle">active</text>
      </g>
      <text x="16" y="100" font-size="12" fill="#666">Implicit grants from role · no overrides</text>
    </g>
    <g transform="translate(263,80)"><rect width="64" height="24" rx="3" /><text x="32" y="16" font-size="11" stroke="none" fill="#000" text-anchor="middle">Edit</text></g>
  </g>

  <g data-region="humans-card-2" transform="translate(16,452)">
    <rect width="343" height="140" rx="4" />
    <g stroke="none">
      <text x="16" y="28" font-size="14" fill="#000" font-weight="600">Jordan Park</text>
      <text x="16" y="46" font-size="12" fill="#666">jordan@acme.ai</text>
      <g transform="translate(16,58)">
        <rect width="56" height="22" rx="11" /><text x="28" y="15" font-size="11" fill="#000" text-anchor="middle">Admin</text>
        <rect x="64" width="58" height="22" rx="11" /><text x="93" y="15" font-size="11" fill="#000" text-anchor="middle">active</text>
      </g>
      <text x="16" y="100" font-size="12" fill="#000">tasks:assign_scope</text>
      <g transform="translate(16,108)">
        <rect width="310" height="22" rx="3" fill="#e6e6e6" stroke="#666" />
        <text x="8" y="15" font-size="10" stroke="none" fill="#000">Project: Onboarding · Agents: 3 · all must match</text>
      </g>
    </g>
    <g transform="translate(263,80)"><rect width="64" height="24" rx="3" /><text x="32" y="16" font-size="11" stroke="none" fill="#000" text-anchor="middle">Edit</text></g>
  </g>

  <g data-region="humans-card-3" transform="translate(16,608)">
    <rect width="343" height="100" rx="4" />
    <g stroke="none">
      <text x="16" y="28" font-size="14" fill="#000" font-weight="600">Sam Rivera</text>
      <text x="16" y="46" font-size="12" fill="#666">sam@acme.ai</text>
      <g transform="translate(16,58)">
        <rect width="68" height="22" rx="11" /><text x="34" y="15" font-size="11" fill="#000" text-anchor="middle">Operator</text>
        <rect x="76" width="64" height="22" rx="11" /><text x="108" y="15" font-size="11" fill="#000" text-anchor="middle">pending</text>
      </g>
    </g>
    <g transform="translate(263,64)"><rect width="64" height="24" rx="3" /><text x="32" y="16" font-size="11" stroke="none" fill="#000" text-anchor="middle">Edit</text></g>
  </g>

  <!-- 6: Agents header -->
  <g data-region="agents-header" transform="translate(16,728)">
    <text x="0" y="20" font-size="18" stroke="none" fill="#000">Agents · 7</text>
    <text x="0" y="40" font-size="11" stroke="none" fill="#666">Profile, config, assign, invoke, escalation.</text>
  </g>

  <!-- 7: Agents cards -->
  <g data-region="agents-card-1" transform="translate(16,780)">
    <rect width="343" height="116" rx="4" />
    <g stroke="none">
      <text x="16" y="28" font-size="14" fill="#000" font-weight="600">CEO · Helios</text>
      <text x="16" y="46" font-size="12" fill="#666">claude-opus · CEO · reports board</text>
      <g transform="translate(16,58)" font-size="10">
        <rect width="74" height="20" rx="3" /><text x="37" y="14" stroke="none" fill="#000" text-anchor="middle">profile: co.</text>
        <rect x="82" width="78" height="20" rx="3" /><text x="121" y="14" stroke="none" fill="#000" text-anchor="middle">config: redact</text>
        <rect x="168" width="80" height="20" rx="3" /><text x="208" y="14" stroke="none" fill="#000" text-anchor="middle">assign: board</text>
      </g>
      <text x="16" y="104" font-size="12" fill="#666">View details →</text>
    </g>
  </g>

  <g data-region="agents-card-2" transform="translate(16,912)">
    <rect width="343" height="124" rx="4" />
    <g stroke="none">
      <text x="16" y="28" font-size="14" fill="#000" font-weight="600">Researcher · Vega</text>
      <g transform="translate(160,14)"><rect width="58" height="20" rx="3" fill="#e6e6e6" stroke="#666" /><text x="29" y="14" font-size="10" stroke="none" fill="#000" text-anchor="middle">private</text></g>
      <text x="16" y="46" font-size="12" fill="#666">claude-haiku · Researcher · reports CTO</text>
      <g transform="translate(16,58)" font-size="10">
        <rect width="80" height="20" rx="3" /><text x="40" y="14" stroke="none" fill="#000" text-anchor="middle">profile: board</text>
        <rect x="88" width="80" height="20" rx="3" /><text x="128" y="14" stroke="none" fill="#000" text-anchor="middle">config: board</text>
        <rect x="176" width="72" height="20" rx="3" /><text x="212" y="14" stroke="none" fill="#000" text-anchor="middle">assign: CTO</text>
      </g>
      <text x="16" y="104" font-size="11" fill="#666">Issues + comments stay company-visible.</text>
    </g>
  </g>

  <!-- 8: bottom CTA -->
  <g data-region="view-all" transform="translate(16,1056)">
    <rect width="343" height="40" rx="4" />
    <text x="171" y="26" font-size="13" stroke="none" fill="#000" text-anchor="middle">View all 7 agents</text>
  </g>

  <!-- 9: home indicator reserve -->
  <g data-region="annotations" stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="32" cy="200" r="10" />
    <circle cx="32" cy="468" r="10" />
    <circle cx="32" cy="800" r="10" />
    <circle cx="200" cy="918" r="10" />
  </g>
  <g font-size="10" stroke="none" fill="#d33">
    <text x="48" y="203">1</text>
    <text x="48" y="471">2</text>
    <text x="48" y="803">3</text>
    <text x="216" y="921">4</text>
  </g>
</svg>
