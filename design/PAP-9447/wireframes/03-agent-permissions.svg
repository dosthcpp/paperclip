<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1320" viewBox="0 0 1280 1320"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="1320" />

  <!-- 1: top bar -->
  <g data-region="topbar">
    <rect x="0" y="0" width="1280" height="56" />
    <text x="24" y="34" font-size="14" stroke="none" fill="#000">Paperclip · Acme AI Co.</text>
    <line x1="220" y1="20" x2="220" y2="36" />
    <text x="240" y="34" font-size="12" stroke="none" fill="#666">Agents › Researcher · Vega › Permissions</text>
  </g>

  <!-- 2: agent header -->
  <g data-region="agent-header" transform="translate(48,80)">
    <rect width="48" height="48" rx="24" fill="#e6e6e6" stroke="#666" />
    <text x="64" y="22" font-size="20" stroke="none" fill="#000">Researcher · Vega</text>
    <g transform="translate(264,4)"><rect width="60" height="22" rx="3" fill="#e6e6e6" stroke="#666" /><text x="30" y="16" font-size="11" stroke="none" fill="#000" text-anchor="middle">private</text></g>
    <g transform="translate(332,4)"><rect width="56" height="22" rx="3" /><text x="28" y="16" font-size="11" stroke="none" fill="#000" text-anchor="middle">active</text></g>
    <text x="64" y="44" font-size="13" stroke="none" fill="#666">claude-haiku · http adapter · reports CTO · Atlas</text>
  </g>

  <!-- 3: subnav tabs for this agent page -->
  <g data-region="agent-tabs" transform="translate(48,160)">
    <line x1="0" y1="40" x2="1184" y2="40" />
    <g font-size="14" stroke="none">
      <text x="0" y="24" fill="#666">Overview</text>
      <text x="100" y="24" fill="#666">Activity</text>
      <text x="184" y="24" fill="#666">Tasks</text>
      <text x="248" y="24" fill="#666">Config</text>
      <text x="328" y="24" fill="#000" font-weight="600">Permissions</text>
      <line x1="324" y1="40" x2="436" y2="40" stroke="#000" stroke-width="2.5" />
      <text x="464" y="24" fill="#666">Budget</text>
      <text x="544" y="24" fill="#666">Runs</text>
    </g>
    <text x="1184" y="20" font-size="12" stroke="none" fill="#666" text-anchor="end">Last changed 2 days ago by Maya Chen</text>
  </g>

  <!-- 4: private marker + privacy rule -->
  <g data-region="private-marker" transform="translate(48,224)">
    <rect width="1184" height="96" rx="4" />
    <g transform="translate(20,28)">
      <text x="0" y="0" font-size="14" stroke="none" fill="#000" font-weight="600">Private agent marker</text>
      <circle cx="170" cy="-6" r="8" fill="#fff" stroke="#666" />
      <text x="170" y="-2" font-size="11" stroke="none" fill="#666" text-anchor="middle">?</text>
    </g>
    <text x="20" y="48" font-size="12" stroke="none" fill="#000" font-weight="600">Agent privacy does not hide work.</text>
    <text x="20" y="64" font-size="12" stroke="none" fill="#666">Hides Vega's profile and config from non-board peers. Issues, comments, and work products stay company-visible. Learn more →</text>
    <g transform="translate(1080,32)">
      <rect width="80" height="28" rx="14" fill="#000" />
      <circle cx="64" cy="14" r="11" fill="#fff" stroke="#000" />
      <text x="14" y="18" font-size="11" fill="#fff" stroke="none">ON</text>
    </g>
    <text x="20" y="84" font-size="11" stroke="none" fill="#666">private · since 2026-04-22 · changed by Maya Chen</text>
  </g>

  <!-- 5: TWO-COLUMN PERMISSIONS GRID -->
  <!-- card: Profile visibility -->
  <g data-region="profile-visibility" transform="translate(48,344)">
    <rect width="584" height="216" rx="4" />
    <text x="20" y="28" font-size="11" stroke="none" fill="#666">1 · PROFILE VISIBILITY</text>
    <text x="20" y="52" font-size="18" stroke="none" fill="#000">Who can see this agent's identity</text>
    <text x="20" y="72" font-size="12" stroke="none" fill="#666">Name, role, capabilities, reporting line.</text>
    <g transform="translate(20,96)">
      <g><circle cx="8" cy="8" r="7" /><text x="22" y="12" font-size="13" stroke="none" fill="#666">Company-visible · everyone in the company</text></g>
      <g transform="translate(0,28)"><circle cx="8" cy="8" r="7" fill="#000" /><circle cx="8" cy="8" r="2.5" fill="#fff" stroke="none" /><text x="22" y="12" font-size="13" stroke="none" fill="#000">Board-only · hidden from peer agents and humans</text></g>
    </g>
    <g transform="translate(20,184)">
      <rect width="544" height="20" fill="#e6e6e6" stroke="#666" />
      <text x="8" y="14" font-size="11" stroke="none" fill="#000">Profile shown to: Board · Maya Chen · Jordan Park · CTO Atlas</text>
    </g>
  </g>

  <!-- card: Config visibility -->
  <g data-region="config-visibility" transform="translate(648,344)">
    <rect width="584" height="216" rx="4" />
    <text x="20" y="28" font-size="11" stroke="none" fill="#666">2 · CONFIG VISIBILITY &amp; REDACTION</text>
    <text x="20" y="52" font-size="18" stroke="none" fill="#000">Who can read the runtime config</text>
    <text x="20" y="72" font-size="12" stroke="none" fill="#666">Adapter, loop behavior, instructions path. Secret-backed fields are always redacted in the UI.</text>
    <g transform="translate(20,96)">
      <g><circle cx="8" cy="8" r="7" /><text x="22" y="12" font-size="13" stroke="none" fill="#666">Company · board reads full, peers read non-secret</text></g>
      <g transform="translate(0,28)"><circle cx="8" cy="8" r="7" fill="#000" /><circle cx="8" cy="8" r="2.5" fill="#fff" stroke="none" /><text x="22" y="12" font-size="13" stroke="none" fill="#000">Board-only · peers see nothing</text></g>
    </g>
    <g transform="translate(20,184)">
      <rect width="544" height="20" fill="#e6e6e6" stroke="#666" />
      <text x="8" y="14" font-size="11" stroke="none" fill="#000">api_key=&lt;secret · anthropic_key_v3&gt;  ·  bearer_token=&lt;secret · vega_http&gt;</text>
    </g>
  </g>

  <!-- card: Assignment / invocation -->
  <g data-region="assignment-invocation" transform="translate(48,584)">
    <rect width="584" height="248" rx="4" />
    <text x="20" y="28" font-size="11" stroke="none" fill="#666">3 · ASSIGNMENT / INVOCATION</text>
    <text x="20" y="52" font-size="18" stroke="none" fill="#000">Who can hand work to Vega</text>
    <text x="20" y="72" font-size="12" stroke="none" fill="#666">Assignment grants execution authority. Invocation = manual heartbeat trigger.</text>

    <g transform="translate(20,92)">
      <text x="0" y="12" font-size="12" stroke="none" fill="#666">CAN ASSIGN TASKS</text>
      <g transform="translate(0,20)" font-size="12">
        <rect width="100" height="22" rx="11" fill="#e6e6e6" stroke="#666" /><text x="50" y="15" stroke="none" fill="#000" text-anchor="middle">Board</text>
        <rect x="108" width="120" height="22" rx="11" fill="#e6e6e6" stroke="#666" /><text x="168" y="15" stroke="none" fill="#000" text-anchor="middle">CTO · Atlas</text>
        <rect x="236" width="124" height="22" rx="11" /><text x="298" y="15" stroke="none" fill="#000" text-anchor="middle">+ Add principal</text>
      </g>
    </g>
    <g transform="translate(20,164)">
      <text x="0" y="12" font-size="12" stroke="none" fill="#666">CAN INVOKE (manual heartbeat)</text>
      <g transform="translate(0,20)" font-size="12">
        <rect width="120" height="22" rx="11" fill="#e6e6e6" stroke="#666" /><text x="60" y="15" stroke="none" fill="#000" text-anchor="middle">CTO · Atlas</text>
        <rect x="128" width="124" height="22" rx="11" /><text x="190" y="15" stroke="none" fill="#000" text-anchor="middle">+ Add principal</text>
      </g>
    </g>
  </g>

  <!-- card: Tool/secret policy -->
  <g data-region="tool-secret-policy" transform="translate(648,584)">
    <rect width="584" height="248" rx="4" />
    <text x="20" y="28" font-size="11" stroke="none" fill="#666">4 · TOOL / SECRET POLICY</text>
    <text x="20" y="52" font-size="18" stroke="none" fill="#000">What Vega can run and read</text>
    <text x="20" y="72" font-size="12" stroke="none" fill="#666">Secret refs are looked up at runtime. Logs and activity always redact secret values.</text>

    <g transform="translate(20,92)" font-size="13">
      <g>
        <text x="0" y="12" stroke="none" fill="#666">ALLOWED TOOLS</text>
        <g transform="translate(0,20)" font-size="12">
          <rect width="78" height="22" rx="3" /><text x="39" y="15" stroke="none" fill="#000" text-anchor="middle">web_fetch</text>
          <rect x="86" width="92" height="22" rx="3" /><text x="132" y="15" stroke="none" fill="#000" text-anchor="middle">web_search</text>
          <rect x="186" width="120" height="22" rx="3" /><text x="246" y="15" stroke="none" fill="#000" text-anchor="middle">file_read (sandbox)</text>
          <rect x="314" width="128" height="22" rx="3" /><text x="378" y="15" stroke="none" fill="#000" text-anchor="middle">+ Add tool</text>
        </g>
      </g>
      <g transform="translate(0,68)">
        <text x="0" y="12" stroke="none" fill="#666">SECRET REFS</text>
        <g transform="translate(0,20)" font-size="12">
          <rect width="148" height="22" rx="3" /><text x="74" y="15" stroke="none" fill="#000" text-anchor="middle">anthropic_key_v3</text>
          <rect x="156" width="92" height="22" rx="3" /><text x="202" y="15" stroke="none" fill="#000" text-anchor="middle">vega_http</text>
          <rect x="256" width="124" height="22" rx="3" /><text x="318" y="15" stroke="none" fill="#000" text-anchor="middle">+ Add ref</text>
        </g>
      </g>
      <g transform="translate(0,128)" font-size="11">
        <rect width="544" height="36" fill="#e6e6e6" stroke="#666" />
        <text x="12" y="14" stroke="none" fill="#000">Tools requiring scopes Vega lacks are filtered from the picker — operators don't see denials they can't act on.</text>
        <text x="12" y="28" stroke="none" fill="#666">Log redaction: anthropic_key_v3 → &lt;redacted&gt; · vega_http → &lt;redacted&gt;</text>
      </g>
    </g>
  </g>

  <!-- card: Escalation authority -->
  <g data-region="escalation" transform="translate(48,856)">
    <rect width="1184" height="184" rx="4" />
    <text x="20" y="28" font-size="11" stroke="none" fill="#666">5 · ESCALATION AUTHORITY</text>
    <text x="20" y="52" font-size="18" stroke="none" fill="#000">Where refusals and blockers route</text>
    <text x="20" y="72" font-size="12" stroke="none" fill="#666">When Vega marks a task blocked or refuses, the assigned owner is notified. If unresolved, escalation walks the chain.</text>

    <g transform="translate(20,100)" font-size="12">
      <g>
        <rect width="140" height="48" />
        <text x="70" y="20" stroke="none" fill="#000" text-anchor="middle">Researcher · Vega</text>
        <text x="70" y="36" stroke="none" fill="#666" text-anchor="middle">refusal / blocked</text>
      </g>
      <line x1="140" y1="24" x2="180" y2="24" />
      <text x="160" y="20" font-size="11" stroke="none" fill="#666" text-anchor="middle">→</text>
      <g transform="translate(180,0)">
        <rect width="140" height="48" />
        <text x="70" y="20" stroke="none" fill="#000" text-anchor="middle">CTO · Atlas</text>
        <text x="70" y="36" stroke="none" fill="#666" text-anchor="middle">manager</text>
      </g>
      <line x1="320" y1="24" x2="360" y2="24" />
      <text x="340" y="20" font-size="11" stroke="none" fill="#666" text-anchor="middle">→</text>
      <g transform="translate(360,0)">
        <rect width="140" height="48" />
        <text x="70" y="20" stroke="none" fill="#000" text-anchor="middle">CEO · Helios</text>
        <text x="70" y="36" stroke="none" fill="#666" text-anchor="middle">grand-manager</text>
      </g>
      <line x1="500" y1="24" x2="540" y2="24" />
      <text x="520" y="20" font-size="11" stroke="none" fill="#666" text-anchor="middle">→</text>
      <g transform="translate(540,0)">
        <rect width="140" height="48" />
        <text x="70" y="20" stroke="none" fill="#000" text-anchor="middle">Board</text>
        <text x="70" y="36" stroke="none" fill="#666" text-anchor="middle">final · approval</text>
      </g>
      <text x="720" y="28" font-size="12" stroke="none" fill="#666">Audit trail: every step writes to activity_log.</text>
    </g>
  </g>

  <!-- card: Audit log -->
  <g data-region="audit" transform="translate(48,1064)">
    <rect width="1184" height="216" rx="4" />
    <text x="20" y="28" font-size="11" stroke="none" fill="#666">RECENT PERMISSION CHANGES</text>
    <line x1="0" y1="44" x2="1184" y2="44" />
    <g transform="translate(20,60)" font-size="12">
      <text x="0" y="14" stroke="none" fill="#000">2026-05-13 · Maya Chen toggled Private agent marker → ON</text>
      <text x="0" y="38" stroke="none" fill="#000">2026-05-12 · Jordan Park added secret ref vega_http</text>
      <text x="0" y="62" stroke="none" fill="#000">2026-05-10 · CTO Atlas added tool web_search</text>
      <text x="0" y="86" stroke="none" fill="#000">2026-05-04 · Maya Chen set config visibility → board-only</text>
      <text x="0" y="110" stroke="none" fill="#666">View full activity →</text>
    </g>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="66" cy="244" r="10" />
    <circle cx="66" cy="364" r="10" />
    <circle cx="666" cy="364" r="10" />
    <circle cx="66" cy="604" r="10" />
    <circle cx="666" cy="604" r="10" />
    <circle cx="66" cy="876" r="10" />
  </g>
  <g font-size="11" stroke="none" fill="#d33">
    <text x="82" y="248">0</text>
    <text x="82" y="368">1</text>
    <text x="682" y="368">2</text>
    <text x="82" y="608">3</text>
    <text x="682" y="608">4</text>
    <text x="82" y="880">5</text>
  </g>
</svg>
