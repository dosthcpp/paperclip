<svg xmlns="http://www.w3.org/2000/svg" width="375" height="1100" viewBox="0 0 375 1100"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="1100" />

  <!-- 1: status + header -->
  <g data-region="topbar">
    <line x1="0" y1="44" x2="375" y2="44" />
    <text x="16" y="76" font-size="14" stroke="none" fill="#666">←  Edit member</text>
    <text x="16" y="108" font-size="20" stroke="none" fill="#000">Scoped task assignment</text>
    <text x="16" y="128" font-size="12" stroke="none" fill="#666">Jordan Park · tasks:assign_scope</text>
  </g>

  <!-- 2: All-of explainer -->
  <g data-region="explainer" transform="translate(16,152)">
    <rect width="343" height="80" rx="4" />
    <text x="16" y="24" font-size="13" stroke="none" fill="#000" font-weight="600">All chosen scopes must match</text>
    <text x="16" y="42" font-size="11" stroke="none" fill="#666">Leave any section "Any" to skip that family.</text>
    <text x="16" y="58" font-size="11" stroke="none" fill="#666">At least one family must be set, or this grant</text>
    <text x="16" y="74" font-size="11" stroke="none" fill="#666">becomes unscoped tasks:assign.</text>
  </g>

  <!-- 3: A: project scope -->
  <g data-region="project-scope" transform="translate(16,260)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">1 · PROJECT SCOPE</text>
    <text x="0" y="36" font-size="14" stroke="none" fill="#000">Restrict to specific projects</text>
    <g transform="translate(0,52)">
      <g><circle cx="8" cy="8" r="7" /><text x="22" y="12" font-size="12" stroke="none" fill="#666">Any project</text></g>
      <g transform="translate(0,24)"><circle cx="8" cy="8" r="7" fill="#000" /><circle cx="8" cy="8" r="2.5" fill="#fff" stroke="none" /><text x="22" y="12" font-size="12" stroke="none" fill="#000">Selected (2)</text></g>
    </g>
    <g transform="translate(0,116)">
      <rect width="343" height="36" rx="4" />
      <rect x="8" y="6" width="100" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="58" y="22" font-size="11" stroke="none" fill="#000" text-anchor="middle">Onboarding ×</text>
      <rect x="116" y="6" width="116" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="174" y="22" font-size="11" stroke="none" fill="#000" text-anchor="middle">Growth Loops ×</text>
      <text x="324" y="22" font-size="11" stroke="none" fill="#666" text-anchor="end">+ Add</text>
    </g>
  </g>

  <!-- 4: B: managed subtree scope -->
  <g data-region="subtree-scope" transform="translate(16,460)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">2 · MANAGED-SUBTREE SCOPE</text>
    <text x="0" y="36" font-size="14" stroke="none" fill="#000">Restrict to everyone under a manager</text>
    <g transform="translate(0,52)">
      <g><circle cx="8" cy="8" r="7" fill="#000" /><circle cx="8" cy="8" r="2.5" fill="#fff" stroke="none" /><text x="22" y="12" font-size="12" stroke="none" fill="#000">Any subtree</text></g>
      <g transform="translate(0,24)"><circle cx="8" cy="8" r="7" /><text x="22" y="12" font-size="12" stroke="none" fill="#666">Selected subtree roots</text></g>
    </g>
    <text x="0" y="116" font-size="11" stroke="none" fill="#666">Selecting a manager grants assignment to that</text>
    <text x="0" y="132" font-size="11" stroke="none" fill="#666">manager and all their reports, recursively.</text>
  </g>

  <!-- 5: C: target agent allowlist -->
  <g data-region="agent-allowlist" transform="translate(16,640)">
    <text x="0" y="14" font-size="11" stroke="none" fill="#666">3 · TARGET-AGENT ALLOWLIST</text>
    <text x="0" y="36" font-size="14" stroke="none" fill="#000">Restrict to a specific list of agents</text>
    <g transform="translate(0,52)">
      <g><circle cx="8" cy="8" r="7" /><text x="22" y="12" font-size="12" stroke="none" fill="#666">Any agent</text></g>
      <g transform="translate(0,24)"><circle cx="8" cy="8" r="7" fill="#000" /><circle cx="8" cy="8" r="2.5" fill="#fff" stroke="none" /><text x="22" y="12" font-size="12" stroke="none" fill="#000">Selected (3)</text></g>
    </g>
    <g transform="translate(0,116)">
      <rect width="343" height="64" rx="4" />
      <rect x="8" y="6" width="116" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="66" y="22" font-size="11" stroke="none" fill="#000" text-anchor="middle">Engineer · Ada ×</text>
      <rect x="132" y="6" width="116" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="190" y="22" font-size="11" stroke="none" fill="#000" text-anchor="middle">Designer · Iris ×</text>
      <rect x="8" y="34" width="108" height="24" rx="12" fill="#e6e6e6" stroke="#666" /><text x="62" y="50" font-size="11" stroke="none" fill="#000" text-anchor="middle">QA · Cypress ×</text>
      <text x="324" y="22" font-size="11" stroke="none" fill="#666" text-anchor="end">+ Add</text>
    </g>
  </g>

  <!-- 6: result summary card -->
  <g data-region="summary" transform="translate(16,852)">
    <rect width="343" height="172" rx="4" />
    <text x="16" y="24" font-size="11" stroke="none" fill="#666">RESULT</text>
    <text x="16" y="48" font-size="13" stroke="none" fill="#000" font-weight="600">Assignment must satisfy ALL:</text>
    <g font-size="12" stroke="none" transform="translate(16,60)">
      <text y="20" fill="#000">Project: Onboarding, Growth Loops</text>
      <text y="40" fill="#666">Subtree: any</text>
      <text y="60" fill="#000">Agent: Ada, Iris, Cypress</text>
    </g>
    <text x="16" y="156" font-size="10" stroke="none" fill="#666">Denials return 403 with a generic message — no leakage of hidden resources.</text>
  </g>

  <!-- 7: sticky footer -->
  <g data-region="sticky-footer" transform="translate(0,1036)">
    <line x1="0" y1="0" x2="375" y2="0" />
    <rect x="0" y="0" width="375" height="64" />
    <g transform="translate(16,12)">
      <rect width="160" height="40" rx="4" /><text x="80" y="25" font-size="13" stroke="none" fill="#000" text-anchor="middle">Cancel</text>
      <rect x="168" width="175" height="40" rx="4" fill="#000" /><text x="255" y="25" font-size="13" stroke="none" fill="#fff" text-anchor="middle">Save grant</text>
    </g>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="32" cy="176" r="9" />
    <circle cx="32" cy="284" r="9" />
    <circle cx="32" cy="484" r="9" />
    <circle cx="32" cy="664" r="9" />
    <circle cx="32" cy="876" r="9" />
  </g>
  <g font-size="10" stroke="none" fill="#d33">
    <text x="46" y="180">1</text>
    <text x="46" y="288">2</text>
    <text x="46" y="488">3</text>
    <text x="46" y="668">4</text>
    <text x="46" y="880">5</text>
  </g>
</svg>
