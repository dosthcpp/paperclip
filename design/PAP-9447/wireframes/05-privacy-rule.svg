<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1080" viewBox="0 0 1280 1080"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="1080" />

  <!-- top bar -->
  <g data-region="topbar">
    <rect x="0" y="0" width="1280" height="56" />
    <text x="24" y="34" font-size="14" stroke="none" fill="#000">Paperclip · Acme AI Co.</text>
    <line x1="220" y1="20" x2="220" y2="36" />
    <text x="240" y="34" font-size="12" stroke="none" fill="#666">Agents › Researcher · Vega › Privacy</text>
  </g>

  <!-- header -->
  <g data-region="header" transform="translate(48,88)">
    <text x="0" y="32" font-size="28" stroke="none" fill="#000">Privacy</text>
    <text x="0" y="56" font-size="14" stroke="none" fill="#666">What "private" means for Vega. Read this before you toggle.</text>
    <text x="1184" y="32" font-size="13" stroke="none" fill="#000" text-anchor="end">Learn more →</text>
  </g>

  <!-- private toggle row -->
  <g data-region="private-toggle" transform="translate(48,184)">
    <rect width="1184" height="96" rx="4" />
    <text x="24" y="36" font-size="16" stroke="none" fill="#000">Private agent</text>
    <text x="24" y="60" font-size="13" stroke="none" fill="#666">Hide Vega's profile and config from non-board peers in the company.</text>
    <text x="24" y="80" font-size="11" stroke="none" fill="#666">Affects two things: who can see this agent in directories, and who can read its config.</text>
    <g transform="translate(1080,32)">
      <rect width="80" height="32" rx="16" fill="#000" />
      <circle cx="64" cy="16" r="13" fill="#fff" stroke="#000" />
      <text x="14" y="20" font-size="11" fill="#fff" stroke="none">ON</text>
    </g>
  </g>

  <!-- big rule banner -->
  <g data-region="big-rule" transform="translate(48,312)">
    <rect width="1184" height="120" rx="4" />
    <text x="24" y="40" font-size="20" stroke="none" fill="#000">Agent privacy does not hide work.</text>
    <text x="24" y="72" font-size="14" stroke="none" fill="#000" font-weight="600">A private marker on an agent does NOT make its work objects private.</text>
    <text x="24" y="96" font-size="13" stroke="none" fill="#666">Issues, comments, projects, work products, costs, and activity stay visible to the whole company.</text>
    <text x="1160" y="40" font-size="12" stroke="none" fill="#666" text-anchor="end">Learn more →</text>
  </g>

  <!-- two columns: hidden vs visible -->
  <g data-region="hidden-col" transform="translate(48,464)">
    <rect width="584" height="368" rx="4" />
    <text x="24" y="36" font-size="11" stroke="none" fill="#666">WHAT THIS HIDES</text>
    <text x="24" y="62" font-size="18" stroke="none" fill="#000">Agent-identity surface</text>
    <line x1="24" y1="80" x2="560" y2="80" />
    <g transform="translate(24,100)" font-size="14" stroke="none" fill="#000">
      <text x="0" y="0">·  Agent profile (name, role, capabilities)</text>
      <text x="0" y="28">·  Reporting-line shown to peers</text>
      <text x="0" y="56">·  Adapter and config metadata</text>
      <text x="0" y="84">·  Tool list and secret-ref names</text>
      <text x="0" y="112">·  Manual invocation buttons</text>
    </g>
    <g transform="translate(24,236)">
      <text x="0" y="0" font-size="11" stroke="none" fill="#666">VISIBLE TO</text>
      <text x="0" y="20" font-size="13" stroke="none" fill="#000">Board · explicit principals on assign/invoke lists · the agent itself</text>
      <text x="0" y="40" font-size="11" stroke="none" fill="#666">Everyone else sees no agent, no card, no entry in pickers.</text>
    </g>
    <g transform="translate(24,304)">
      <text x="0" y="0" font-size="11" stroke="none" fill="#666">DOES NOT HIDE</text>
      <text x="0" y="20" font-size="13" stroke="none" fill="#000">Work the agent created or commented on (see right column).</text>
    </g>
  </g>

  <g data-region="visible-col" transform="translate(648,464)">
    <rect width="584" height="368" rx="4" />
    <text x="24" y="36" font-size="11" stroke="none" fill="#666">WHAT STAYS COMPANY-VISIBLE</text>
    <text x="24" y="62" font-size="18" stroke="none" fill="#000">Work objects (unchanged)</text>
    <line x1="24" y1="80" x2="560" y2="80" />
    <g transform="translate(24,100)" font-size="14" stroke="none" fill="#000">
      <text x="0" y="0">·  Issues Vega created or is assigned</text>
      <text x="0" y="28">·  Comments Vega wrote</text>
      <text x="0" y="56">·  Projects, goals, attachments</text>
      <text x="0" y="84">·  Cost events and budget impact</text>
      <text x="0" y="112">·  Activity log (with agent shown as "Private agent" to non-board peers)</text>
    </g>
    <g transform="translate(24,260)">
      <rect width="536" height="80" rx="4" fill="#e6e6e6" stroke="#666" />
      <text x="16" y="24" font-size="13" stroke="none" fill="#000" font-weight="600">Why this distinction matters</text>
      <text x="16" y="44" font-size="12" stroke="none" fill="#666">Company-visible work keeps the board's accountability surface intact —</text>
      <text x="16" y="60" font-size="12" stroke="none" fill="#666">budgets, audits, approvals — without exposing every agent's plumbing.</text>
    </g>
  </g>

  <!-- bottom-bar future: pro tier -->
  <g data-region="pro-tier" transform="translate(48,856)">
    <rect width="1184" height="120" rx="4" stroke-dasharray="6 4" />
    <text x="24" y="36" font-size="11" stroke="none" fill="#666">WHAT THIS DOESN'T DO</text>
    <text x="24" y="64" font-size="16" stroke="none" fill="#000">Project- and issue-level ACLs are a future Pro/Enterprise tier.</text>
    <text x="24" y="88" font-size="13" stroke="none" fill="#666">If you need to hide specific issues or projects from some company members, that's coming in a separate slice. </text>
    <text x="24" y="104" font-size="13" stroke="none" fill="#666">For now, scope your control at the role/grant layer — not via the private marker.</text>
    <text x="1160" y="64" font-size="12" stroke="none" fill="#666" text-anchor="end">Roadmap →</text>
  </g>

  <!-- footer link -->
  <g data-region="footer-link" transform="translate(48,1000)">
    <text x="0" y="14" font-size="12" stroke="none" fill="#666">Want to broaden visibility back? Switch off the toggle. The change is logged in the activity log.</text>
  </g>

  <!-- annotations -->
  <g stroke="#d33" stroke-dasharray="4 3" fill="none">
    <circle cx="66" cy="204" r="10" />
    <circle cx="66" cy="332" r="10" />
    <circle cx="66" cy="484" r="10" />
    <circle cx="666" cy="484" r="10" />
    <circle cx="66" cy="876" r="10" />
  </g>
  <g font-size="11" stroke="none" fill="#d33">
    <text x="82" y="208">1</text>
    <text x="82" y="336">2</text>
    <text x="82" y="488">3</text>
    <text x="682" y="488">4</text>
    <text x="82" y="880">5</text>
  </g>
</svg>
